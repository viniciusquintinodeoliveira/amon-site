<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instituto AMON — Em Breve</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Montserrat', sans-serif; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 20%, #C9A090 0%, #A97B6E 45%, #7A5252 100%);
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none; opacity: 0.35; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; top: -15%; left: -10%;
      width: 55vw; height: 55vw;
      background: radial-gradient(circle, rgba(255,235,220,0.16) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: 2rem;
      animation: fadeUp 1.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      width: clamp(260px, 38vw, 400px);
      animation: float 7s ease-in-out infinite;
      filter: drop-shadow(0 12px 40px rgba(60,20,20,0.28));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }
    .divider {
      width: 1px; height: 52px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.55), transparent);
      margin: 2rem 0;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 0.65rem;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 100px; padding: 0.55rem 1.5rem; margin-bottom: 1.4rem;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.92);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.75); }
    }
    .badge span {
      font-size: 0.68rem; font-weight: 400; letter-spacing: 0.28em;
      color: rgba(255,255,255,0.88); text-transform: uppercase;
    }
    .message {
      font-weight: 300; font-size: 1rem;
      color: rgba(255,255,255,0.62); letter-spacing: 0.04em; line-height: 1.9;
    }
    footer {
      position: fixed; bottom: 1.8rem; left: 0; right: 0; text-align: center;
      font-size: 0.58rem; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.28); text-transform: uppercase; z-index: 1;
    }
  </style>
</head>
